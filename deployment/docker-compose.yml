version: "3.9"

services:
  api:
    build:
      context: ../api
      dockerfile: TaskManager.Api/Dockerfile
    ports:
      - "5001:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/taskmanager.db
      - Jwt__Secret=${JWT_SECRET:-change_me_at_least_32_characters_long}
      - Jwt__Issuer=TaskManagerApi
      - Jwt__Audience=TaskManagerClient
      - Jwt__ExpiryHours=24
    volumes:
      - ./data:/app/data
      - api-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  api-logs:

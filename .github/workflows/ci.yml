name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── API ──────────────────────────────────────────────────────────────────────

  lint-api:
    name: Lint — API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore packages
        run: |
          dotnet restore api/TaskManager.Api
          dotnet restore api/TaskManager.Tests

      - name: Check formatting
        run: |
          dotnet format api/TaskManager.Api --verify-no-changes
          dotnet format api/TaskManager.Tests --verify-no-changes

  test-api:
    name: Test — xUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run tests
        run: dotnet test api/TaskManager.Tests

  # ── Frontend ─────────────────────────────────────────────────────────────────

  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Prettier
        run: npm run format:check
        working-directory: frontend

  test-frontend:
    name: Test — Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Run Vitest
        run: npm test
        working-directory: frontend

  # ── E2E ──────────────────────────────────────────────────────────────────────

  test-e2e:
    name: Test — Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Pre-restore so `dotnet run` inside playwright webServer starts faster
      - name: Restore .NET packages
        run: dotnet restore api/TaskManager.Api

      - run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      # playwright.config.ts webServer starts the API + Vite dev server automatically
      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
